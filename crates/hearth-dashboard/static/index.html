<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hearth — Local network intelligence dashboard. No cloud. No subscription.">
<title>Hearth — Network Intelligence</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#2a2a2a;
  --accent:#e8593c;--accent-glow:rgba(232,89,60,0.15);
  --green:#34d399;--amber:#fbbf24;--red:#ef4444;
  --text:#e5e5e5;--text-muted:#888;--mono:'SFMono-Regular',Consolas,'Liberation Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{background:linear-gradient(135deg,#1a1a1a 0%,#0f0f0f 100%);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:.75rem}
.logo svg{width:32px;height:32px}
.logo h1{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#ff8a65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:.5rem}
.nav button{background:none;border:1px solid var(--border);color:var(--text-muted);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s}
.nav button:hover,.nav button.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;padding:1.5rem 2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.stat-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.5rem}
.stat-value{font-size:1.75rem;font-weight:700;font-family:var(--mono)}
.stat-value.accent{color:var(--accent)}

/* Anomaly Banner */
.anomaly-banner{margin:0 2rem;background:linear-gradient(135deg,rgba(239,68,68,0.1),rgba(232,89,60,0.05));border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:1rem 1.5rem;cursor:pointer;transition:all .2s;display:none}
.anomaly-banner.visible{display:block;animation:slideIn .3s ease}
.anomaly-banner:hover{border-color:var(--red)}
.anomaly-banner h3{color:var(--red);font-size:.9rem;display:flex;align-items:center;gap:.5rem}
.anomaly-list{margin-top:.75rem;display:none}
.anomaly-banner.expanded .anomaly-list{display:block}
.anomaly-item{background:var(--surface);border-radius:8px;padding:.75rem 1rem;margin-top:.5rem;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.anomaly-item .kind{color:var(--amber);font-family:var(--mono);font-size:.75rem}
.resolve-btn{background:var(--accent);color:#fff;border:none;padding:.3rem .75rem;border-radius:6px;cursor:pointer;font-size:.75rem;transition:opacity .2s}
.resolve-btn:hover{opacity:.8}

/* Device Table */
.table-section{padding:1rem 2rem}
.table-section h2{font-size:1rem;color:var(--text-muted);margin-bottom:1rem;font-weight:500}
.device-table{width:100%;border-collapse:collapse}
.device-table th{text-align:left;padding:.75rem 1rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);border-bottom:1px solid var(--border);position:sticky;top:60px;background:var(--bg)}
.device-table td{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem;transition:background .15s}
.device-table tr:hover td{background:var(--surface)}
.device-table tr{cursor:pointer}
.mac{font-family:var(--mono);font-size:.8rem;color:var(--text-muted)}
.bytes{font-family:var(--mono);font-size:.85rem}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:.5rem}
.dot.green{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,0.4)}
.dot.amber{background:var(--amber);box-shadow:0 0 8px rgba(251,191,36,0.4)}
.dot.red{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,0.4);animation:pulse 2s infinite}

/* Device Detail Panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:0 2rem 1rem;padding:1.5rem;display:none;animation:slideIn .3s ease}
.detail-panel.visible{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.detail-section h3{font-size:.85rem;color:var(--accent);margin-bottom:.75rem}
.detail-section p{font-size:.85rem;color:var(--text-muted);line-height:1.8}
.sparkline-canvas{width:100%;height:80px;border-radius:8px;background:var(--card)}
.dest-list{list-style:none;font-size:.8rem;color:var(--text-muted)}
.dest-list li{padding:.25rem 0;font-family:var(--mono)}

/* Digest Tab */
.digest-tab{padding:1.5rem 2rem;display:none}
.digest-tab.visible{display:block}
.digest-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.digest-card h3{color:var(--accent);font-size:.9rem;margin-bottom:.75rem}
.highlight{background:var(--surface);border-left:3px solid var(--accent);padding:.75rem 1rem;margin:.5rem 0;border-radius:0 8px 8px 0;font-size:.85rem}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Responsive */
@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr;padding:1rem}
  .header{padding:.75rem 1rem}
  .table-section,.anomaly-banner,.detail-panel,.digest-tab{margin:0 1rem;padding:1rem}
  .device-table{font-size:.75rem}
  .device-table th,.device-table td{padding:.5rem}
  .detail-grid{grid-template-columns:1fr}
  .hide-mobile{display:none}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="#e8593c" stroke-width="2"/><path d="M16 8v8l5 5" stroke="#e8593c" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="16" r="3" fill="#e8593c" opacity=".3"/></svg>
    <h1>Hearth</h1>
  </div>
  <nav class="nav">
    <button class="active" onclick="showTab('overview')" id="tab-overview">Overview</button>
    <button onclick="showTab('digest')" id="tab-digest">Weekly Digest</button>
  </nav>
</header>

<div id="anomaly-banner" class="anomaly-banner" onclick="toggleAnomalyList()">
  <h3>🔴 <span id="anomaly-count">0</span> Active Anomalies</h3>
  <div class="anomaly-list" id="anomaly-list"></div>
</div>

<div id="overview-tab">
  <div class="stats" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Devices</div><div class="stat-value" id="stat-devices">—</div></div>
    <div class="stat-card"><div class="stat-label">Uploaded Today</div><div class="stat-value accent" id="stat-upload">—</div></div>
    <div class="stat-card"><div class="stat-label">Active Anomalies</div><div class="stat-value" id="stat-anomalies">—</div></div>
    <div class="stat-card"><div class="stat-label">Most Active</div><div class="stat-value" id="stat-active" style="font-size:1rem">—</div></div>
  </div>

  <div class="table-section">
    <h2>Network Devices</h2>
    <table class="device-table">
      <thead><tr>
        <th>Name / MAC</th><th class="hide-mobile">Vendor</th><th>IP</th>
        <th>↑ Sent (1h)</th><th>↓ Recv (1h)</th>
        <th class="hide-mobile">Top Country</th><th>Status</th>
      </tr></thead>
      <tbody id="device-tbody"></tbody>
    </table>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-grid">
      <div class="detail-section">
        <h3>📊 24h Traffic</h3>
        <canvas class="sparkline-canvas" id="sparkline" width="400" height="80"></canvas>
      </div>
      <div class="detail-section">
        <h3>🔍 Profile</h3>
        <p id="profile-info">Loading...</p>
      </div>
      <div class="detail-section">
        <h3>🌍 Known Destinations</h3>
        <ul class="dest-list" id="dest-list"></ul>
      </div>
      <div class="detail-section">
        <h3>⚠️ Recent Anomalies</h3>
        <div id="device-anomalies"></div>
      </div>
    </div>
  </div>
</div>

<div class="digest-tab" id="digest-tab">
  <div id="digest-content"></div>
</div>

<script>
let selectedMac = null;

function showTab(tab) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('overview-tab').style.display = tab === 'overview' ? 'block' : 'none';
  document.getElementById('digest-tab').className = tab === 'digest' ? 'digest-tab visible' : 'digest-tab';
  if (tab === 'digest') loadDigest();
}

function humanBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}

async function fetchSummary() {
  try {
    const r = await fetch('/api/summary');
    const d = await r.json();
    document.getElementById('stat-devices').textContent = d.total_devices;
    document.getElementById('stat-upload').textContent = humanBytes(d.total_bytes_sent_today);
    document.getElementById('stat-anomalies').textContent = d.active_anomalies;
    document.getElementById('stat-active').textContent = d.most_active_device || '—';
  } catch(e) { console.warn('Summary fetch failed:', e); }
}

async function fetchDevices() {
  try {
    const r = await fetch('/api/devices');
    const devices = await r.json();
    const tbody = document.getElementById('device-tbody');
    tbody.innerHTML = '';
    devices.forEach(d => {
      const name = d.label || d.mac;
      const status = d.anomaly_count > 0 ? 'red' : (d.profile_mature ? 'green' : 'amber');
      const statusLabel = d.anomaly_count > 0 ? 'Anomaly' : (d.profile_mature ? 'Normal' : 'Profiling');
      const tr = document.createElement('tr');
      tr.onclick = () => toggleDetail(d.mac);
      tr.innerHTML = `
        <td><strong>${esc(name)}</strong><br><span class="mac">${esc(d.mac)}</span></td>
        <td class="hide-mobile">${esc(d.vendor || '—')}</td>
        <td><span class="mac">${esc(d.ip)}</span></td>
        <td class="bytes">${humanBytes(d.bytes_sent_last_hour)}</td>
        <td class="bytes">${humanBytes(d.bytes_recv_last_hour)}</td>
        <td class="hide-mobile">${esc(d.top_country || '—')}</td>
        <td><span class="dot ${status}"></span>${statusLabel}</td>`;
      tbody.appendChild(tr);
    });
  } catch(e) { console.warn('Devices fetch failed:', e); }
}

async function fetchAnomalies() {
  try {
    const r = await fetch('/api/anomalies');
    const anomalies = await r.json();
    const banner = document.getElementById('anomaly-banner');
    const count = document.getElementById('anomaly-count');
    const list = document.getElementById('anomaly-list');
    count.textContent = anomalies.length;
    banner.className = anomalies.length > 0 ? 'anomaly-banner visible' : 'anomaly-banner';
    list.innerHTML = anomalies.map(a => `
      <div class="anomaly-item">
        <div><span class="kind">${esc(a.kind)}</span> — ${esc(a.detail)}<br>
        <small style="color:var(--text-muted)">${esc(a.mac)} · ${new Date(a.detected_at).toLocaleString()}</small></div>
        <button class="resolve-btn" onclick="event.stopPropagation();resolveAnomaly(${a.id})">Resolve</button>
      </div>`).join('');
  } catch(e) {}
}

function toggleAnomalyList() {
  document.getElementById('anomaly-banner').classList.toggle('expanded');
}

async function resolveAnomaly(id) {
  await fetch(`/api/anomalies/${id}/resolve`, {method:'POST'});
  fetchAnomalies();
}

async function toggleDetail(mac) {
  const panel = document.getElementById('detail-panel');
  if (selectedMac === mac) { panel.classList.remove('visible'); selectedMac = null; return; }
  selectedMac = mac;
  panel.classList.add('visible');

  // Load profile
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(mac)}/profile`);
    const info = document.getElementById('profile-info');
    if (r.ok) {
      const p = await r.json();
      info.innerHTML = `<strong>Status:</strong> ${p.observation_hours >= 72 ? '✅ Profile built' : `⏳ Profiling (${p.observation_hours}/72h)`}<br>
        <strong>Normal range:</strong> ${humanBytes(p.baseline_bytes_sent_per_hour_mean - p.baseline_bytes_sent_per_hour_stddev)}–${humanBytes(p.baseline_bytes_sent_per_hour_mean + p.baseline_bytes_sent_per_hour_stddev)}/hr<br>
        <strong>Active hours:</strong> ${p.active_hours.join(', ') || 'N/A'}`;
    } else { info.textContent = 'No profile yet — needs 72h of observation.'; }
  } catch(e) { document.getElementById('profile-info').textContent = 'Error loading profile.'; }

  // Load destinations from profile
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(mac)}/profile`);
    if (r.ok) {
      const p = await r.json();
      document.getElementById('dest-list').innerHTML =
        (p.known_destinations || []).slice(0, 10).map(d => `<li>${esc(d)}</li>`).join('') || '<li>None yet</li>';
    }
  } catch(e) {}

  // Load anomalies
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(mac)}/anomalies`);
    const anomalies = await r.json();
    document.getElementById('device-anomalies').innerHTML =
      anomalies.slice(0, 5).map(a => `<div class="anomaly-item"><span class="kind">${esc(a.kind)}</span> ${esc(a.detail)}</div>`).join('') || '<p style="color:var(--text-muted);font-size:.85rem">No anomalies detected.</p>';
  } catch(e) {}

  // Load sparkline
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(mac)}/history?hours=24`);
    const samples = await r.json();
    drawSparkline(samples);
  } catch(e) {}
}

function drawSparkline(samples) {
  const c = document.getElementById('sparkline');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);
  if (!samples.length) { ctx.fillStyle='#888'; ctx.fillText('No data yet', 10, h/2); return; }
  const vals = samples.map(s => s.bytes_sent + s.bytes_recv);
  const max = Math.max(...vals, 1);
  const step = w / (vals.length - 1 || 1);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(232,89,60,0.3)');
  grad.addColorStop(1, 'rgba(232,89,60,0)');
  ctx.beginPath();
  ctx.moveTo(0, h);
  vals.forEach((v, i) => ctx.lineTo(i * step, h - (v / max) * (h - 10)));
  ctx.lineTo(w, h);
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  vals.forEach((v, i) => { const fn = i === 0 ? 'moveTo' : 'lineTo'; ctx[fn](i * step, h - (v / max) * (h - 10)); });
  ctx.strokeStyle = '#e8593c';
  ctx.lineWidth = 2;
  ctx.stroke();
}

async function loadDigest() {
  try {
    const r = await fetch('/api/digest');
    const d = await r.json();
    const el = document.getElementById('digest-content');
    el.innerHTML = `
      <div class="digest-card">
        <h3>📅 Weekly Summary</h3>
        <p style="color:var(--text-muted);font-size:.85rem">${new Date(d.period_start).toLocaleDateString()} — ${new Date(d.period_end).toLocaleDateString()}</p>
        <p style="margin-top:.5rem">${d.total_anomalies} anomalies detected · Most active: ${esc(d.most_active_device || 'N/A')}</p>
      </div>
      ${d.highlights.length ? '<div class="digest-card"><h3>💡 Highlights</h3>' + d.highlights.map(h => `<div class="highlight">${esc(h)}</div>`).join('') + '</div>' : ''}
      ${d.new_devices_seen.length ? '<div class="digest-card"><h3>🆕 New Devices</h3>' + d.new_devices_seen.map(dev => `<div class="highlight">${esc(dev.label || dev.mac)} — ${esc(dev.vendor || 'Unknown vendor')}</div>`).join('') + '</div>' : ''}
      ${d.top_destinations_by_country.length ? '<div class="digest-card"><h3>🌍 Top Countries</h3>' + d.top_destinations_by_country.map(([c, b]) => `<div class="highlight">${esc(c)} — ${humanBytes(b)}</div>`).join('') + '</div>' : ''}`;
  } catch(e) { document.getElementById('digest-content').innerHTML = '<p style="color:var(--text-muted);padding:2rem">No digest data available yet.</p>'; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// Initial load + auto-refresh
fetchSummary(); fetchDevices(); fetchAnomalies();
setInterval(() => { fetchSummary(); fetchDevices(); fetchAnomalies(); }, 10000);
</script>
</body>
</html>
